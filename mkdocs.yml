site_name: RapidTest Documentation
site_description: A super lightweight and blazingly fast library to simplify REST API testing
site_url: https://rapidtest.readthedocs.io/
site_author: Hector Rosales

# Repository
repo_name: RapidTest
repo_url: https://github.com/yourusername/rapidtest

# Theme
theme:
  name: material
  logo: images/RapidTest-logo.png
  favicon: images/RapidTest-logo.png

  palette:
    # Primary colors
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

  icon:
    repo: fontawesome/brands/github
    # Using custom logo instead of material icon
    # logo: material/rocket

  language: en

# Plugins
plugins:
  - search
  - awesome-pages

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

# Navigation
nav:
  - RapidTest: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Learn:
    - About Threadings: learn/threadings.md
  - Tutorial:
    - Basic Usage: tutorial/basic-usage.md
  - API Reference:
    - RapidTest Class: api/rapidtest.md
    - Performance Testing: api/performance.md
    - Data Generation: api/rapiddata.md
  - Examples:
    - Basic Example: examples/basic.md
    - Performance Testing Example: examples/performance.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/rapidtest
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/rapidtest/
site_name: Documentation
site_description: A super lightweight and blazingly fast library to simplify REST API testing
site_url: https://rapidtest.readthedocs.io/
site_author: Hector Rosales
repo_name: RapidTest
repo_url: https://github.com/Hector-2710/rapidtest

theme:
  name: material
  logo: images/RapidTest-logo.png
  favicon: images/RapidTest-logo.png

  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

  icon:
    repo: fontawesome/brands/github

  language: en

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - RapidTest: index.md
  - To Begin:
    - Installation: begin/installation.md
    - Quick Start: begin/quick-start.md
  - Learn:
    - HTTP Methods: learn/http-methods.md
    - HTTP Headers: learn/http-headers.md
    - About Threads: learn/threads.md
  - Tutorial:
    - Basic Usage: tutorial/basic.md
  - API Reference:
    - RapidTest Class: api/rapidtest.md
    - Performance Testing: api/performance.md
    - Data Generation: api/rapiddata.md
  - Examples:
    - Basic Example: examples/basic.md
    - Advanced Example: examples/advanced.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hector-2710/rapidtest
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/rapidtest/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/RosalesHector27